# 1. Initialize the IP collection
SecAction "id:2000,phase:1,nolog,pass,initcol:ip=%{REMOTE_ADDR}"

# 2. Count access attempts (Increments the counter and sets a 60-second expiration)
SecRule REQUEST_URI "@contains /vulnerabilities/weak_id/" \
    "id:2001,phase:1,nolog,pass,setvar:ip.session_attempts=+1,expirevar:ip.session_attempts=60"

# 3. Enforcement (Check if the threshold of 15 attempts is exceeded)
SecRule IP:session_attempts "@gt 15" \
    "id:2002,phase:1,deny,status:429,msg:'Brute-force Session ID detected',logdata:'Current attempts: %{ip.session_attempts}'"
